<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="card">
        <div id="card-content">
            <div id="card-title">
                <h2>Login</h2>
                <div class="underline-title"></div>
            </div>
        </div>
        <form method="POST"
        action="login.php"
        class="form">
        <label for="USERNAME"
        style="padding-top: 13px;">&nbsp;USERNAME</label>
        <input id="USERNAME"
        class="form-content"
        type="username"
        name="username"
        autocomplete="on"
        required/>

        <div class="form-border"></div>
         <label for="PASSWORD"
        style="padding-top: 13px;">&nbsp;PASSWORD</label>
        <input id="PASSWORD"
        class="form-content"
        type="password"
        name="password"
        autocomplete="on"
        required/>
        <div class="form-border"></div>
        <input id="submit-btn"
        type="submit" name="submit"
        value="LOGIN"/>
    </form>
</body>
</html>
